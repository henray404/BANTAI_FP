# env_config.yaml - Warehouse env hyperparameters (canonical reference).
# Python defaults in env/warehouse_scene.py and env/warehouse_env.py mirror these.
# Update BOTH when values change.
#
# Layout v2 (2026-05-30):
#   - Room: 20x30m (rectangular, x+-10, y+-15)
#   - 9 island blocks (3x3), 2 racks each = 18 racks
#   - 18 size-coded boxes (fragile/regular/heavy cycling per rack)
#   - Props: forklift + 2 pallet-asm (receiving) + 2 pallets + 4 cones + 2 signs
#   - Zones moved south: y=-12 (was -7)
#   - num_envs: 2 (VRAM safe for 30m room + props; try 4 after OOM test)
#   - episode_length_s: 60 (north->south ~25m @1m/s + island nav)
#   - env_spacing: 32 (>30m largest dim + buffer)
#   - spawn: receiving-north (x[-8,8], y[11,14])
#   - out_of_bounds: rectangular (x+-9.5, y+-14.5)

env:
  num_envs: 1   # 1 env: Ridgeback-Franka + 54 rigid boxes saturates 8GB RTX 5050
  env_spacing: 32.0         # must exceed 30m room + buffer
  episode_length_s: 60.0    # 60s x 10Hz = 600 steps
  decimation: 20            # 200Hz physics / 20 = 10Hz policy (DreamerNav std)
  control_hz: 10

simulation:
  dt: 0.005
  physics_hz: 200
  render_interval: 20

robot:
  type: "carter_v1"
  source: "ISAAC_NUCLEUS_DIR/Robots/NVIDIA/Carter/carter_v1.usd"
  wheel_base: 0.413         # Carter v1 APPROXIMATE — verify on first run (carter_v2.4 not on Isaac 5.1 server)
  wheel_radius: 0.100       # Carter v1 APPROXIMATE — verify on first run
  max_lin_speed: 1.5        # m/s — Carter capable 2.0; 1.5 safe for training
  max_ang_speed: 1.5        # rad/s
  action_scale: 1.0
  init_pos: [0.0, 0.0, 0.15]  # Carter sits 15cm off ground (was 5cm Jetbot)
  spawn_x: [-8.0, 8.0]     # receiving-north x range
  spawn_y: [11.0, 14.0]    # receiving-north y range
  physics:
    static_friction: 0.9
    dynamic_friction: 0.7
    restitution: 0.0
    friction_combine_mode: "multiply"
    max_depenetration_velocity: 1.0   # was 5.0 — lower prevents ghost-through
    effort_limit: 20.0                # N·m (was 100.0 — nonsensical for any robot)
    velocity_limit: 25.0              # rad/s

observation:
  image_size: [64, 64]
  channels: 3
  goal_embedding_dim: 512
  obs_keys: ["pixels", "position", "goal", "goal_emb", "heading"]
  heading_dim: 2   # [cos(yaw), sin(yaw)] — added to fix random-spawn orientation blindness

camera:
  prim_path_suffix: "/Robot/onboard_cam"
  update_period: 0.1
  focal_length: 18.0          # was 24.0; 18mm → HFOV ~60° (was 47°); matches RealSense D435
  horizontal_aperture: 20.955
  offset_pos: [0.15, 0.0, 0.50]   # was [0.05, 0.0, 0.10]; 50cm height on Carter
  offset_rot: [0.5, -0.5, 0.5, -0.5]
  data_types: ["rgb"]
  note: "TiledCameraCfg only - CameraCfg crashes on RTX 5050 Blackwell"

action:
  space: "Box(-1, 1, shape=(2,))"
  axes: ["linear_vel", "angular_vel"]

reward:
  delivery_success: 10.0      # was 1.0 — raised to balance against shaping scale
  shaping_weight: -0.01       # was +0.05 (with negative func); now sign in weight, func returns +dist
  time_penalty: -0.005        # was -0.001
  collision_penalty: 5.0      # new — func returns 0/-1; effective=-5 per collision step
  goal_threshold: 1.5         # was 0.5m — now matches zone edge (3x3m zone → ±1.5m)

termination:
  goal_reached_threshold: 1.5  # was 0.5m — matches reward goal_threshold
  out_of_bounds_half_extent_x: 9.5
  out_of_bounds_half_extent_y: 14.5

scene:
  room:
    half_extent_x: 10.0
    half_extent_y: 15.0
    wall_height: 6.0
    wall_thickness: 0.3

  ground:
    static_friction: 0.8
    dynamic_friction: 0.6
    restitution: 0.0

  islands:
    layout: "3x3 grid"
    cols_x: [-6, 0, 6]
    rows_y: [8, 1, -5]
    racks_per_island: 2
    island_rack_dx: 1.5     # TUNE: must exceed rack footprint_x (run explore_rack.py)
    total_racks: 18

  racks:
    usd: "assets/Shelving/Racks/Rack_L/Rack_L01_PR_NVD_01.usd"
    scale: 0.01             # cm->m unit fix; no auto-convert in Isaac Lab UsdFileCfg
    shelf_z: 1.5            # RETUNE: was Rack_A (2.0m). Rack_L height unknown -> run explore_rack.py

  items:
    count: 18
    type: "static_usd"      # AssetBaseCfg, stays on shelves across resets
    categories:
      fragile: { usd: "CubeBox_A03_21cm_PR_NVD_01.usd", size_m: 0.21 }
      regular: { usd: "CubeBox_A05_32cm_PR_NVD_01.usd", size_m: 0.32 }
      heavy:   { usd: "CubeBox_A07_52cm_PR_NVD_01.usd", size_m: 0.52 }

  zones:
    count: 3
    size: [3.0, 3.0, 0.02]
    list:
      - { name: "zone_A", color: [1.0, 0.9, 0.0], pos: [-6.0, -12.0, 0.01], category: "fragile" }
      - { name: "zone_B", color: [0.0, 0.9, 0.9], pos: [ 0.0, -12.0, 0.01], category: "regular" }
      - { name: "zone_C", color: [0.7, 0.0, 0.9], pos: [ 6.0, -12.0, 0.01], category: "heavy"   }

  props:
    forklift:       { count: 1, usd: "Equipment/Forklifts/Forklift_A/Forklift_A01_PR_V_NVD_01.usd", pos: [-5, 12, 0] }
    boxes_on_pallet:{ count: 2, usd: "Shipping/Cardboard_Boxes_on_Pallet/Pallet_Asm_A/", pos: [[3,12,0],[5,12,0]] }
    empty_pallet:   { count: 2, usd: "Shipping/Pallets/Plastic/Economy_A/EconomyPlasticPallet_A01_PR_NVD_01.usd" }
    cone:           { count: 4, usd: "Safety/Cones/Heavy-Duty_Traffic/HeavyDutyTrafficCone_A02_71cm_PR_V_NVD_01.usd" }
    warning_sign:   { count: 2, usd: "Safety/Floor_Signs/Warning_A/WarningSign_A01_PR_NVD_01.usd" }
