# experiments/ablation_tr128.yaml — variant of ablation.yaml with dreamer.train_ratio = 128.
#
# Identical to ablation.yaml EXCEPT the DreamerV3 train_ratio is lowered 512 -> 128 (~4x
# fewer replay/grad steps per env step -> ~4x faster wall-clock, less sample-efficient).
# Pass with `--config experiments/ablation_tr128.yaml` to scope it to a run WITHOUT touching
# the shared default (so #4 caslope and anyone else on ablation.yaml stay at 512).
#
# NOTE (methodology): for a valid #3-vs-#4 CA-SLOPE comparison, #3 and #4 MUST share the same
# train_ratio. If you run #3 at 128 here, run #4 at 128 too (same --config) or the ablation breaks.

# ── Training budget (all 6 configs) ───────────────────────────────────────────
budget:
  total_steps: 200000     # env steps per run (spec; CLI --steps overrides)
  seeds: [0, 1, 2]        # 3 seeds -> 18 runs total
  eval_every: 10000       # env steps between success-rate evals
  eval_episodes: 5        # episodes averaged per eval

# ── CA-SLOPE (configs #4, #6) ─────────────────────────────────────────────────
ca_slope:
  mode: category
  gamma: 0.997
  category_gains: [1.0, 1.5, 2.0]
  generic_gain: 1.5
  phase_b_offset: 13.0

# ── Visual HER (configs #5, #6) ───────────────────────────────────────────────
visual_her:
  her_ratio: 0.5
  success_reward: 10.0

# ── DreamerV3 (configs #3-6) ──────────────────────────────────────────────────
dreamer:
  train_ratio: 128         # lowered from 512 for ~4x faster wall-clock (this file's whole point)
  prefill: 2000

# ── Baselines ─────────────────────────────────────────────────────────────────
sac:
  learning_rate: 0.0003
  buffer_size: 200000
  learning_starts: 5000
  batch_size: 256
  tau: 0.005
  gamma: 0.99

ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
